<!DOCTYPE html>
<html>

<head>
    <title>Stock Drafter</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

    <div class="navbar">
        <div class="logo">Stocks</div>
        <div class="search-box">
            <input id="symbolInput" placeholder="ticker search" />
        </div>
    </div>
    <div id="loading">Loading...</div>

    <div id="priceDisplay">
        $0.00
        <span id="priceChange"></span>
    </div>

    <div class="card">
        <h2 id="stockTitle">Choose Stock</h2>
        <div class="stats">
            <div>Open <span id="openPrice"></span></div>
            <div>High <span id="highPrice"></span></div>
            <div>Low <span id="lowPrice"></span></div>
            <div>Close <span id="closePrice"></span></div>
        </div>
        <div class="fundamentals">
            <div>Market Cap <span id="marketCap"></span></div>
            <div>EPS (TTM) <span id="eps"></span></div>
            <div>P/E Ratio <span id="pe"></span></div>
            <div>Dividend Yield <span id="dividend"></span></div>
        </div>
        <div class="time-buttons">
            <button onclick="setRange('5D')">5D</button>
            <button onclick="setRange('1M')">1M</button>
            <button onclick="setRange('6M')">6M</button>
            <button onclick="setRange('YTD')">YTD</button>
            <button onclick="setRange('1Y')">1Y</button>
            <button onclick="setRange('5Y')">5Y</button>
            <button onclick="setRange('ALL')">ALL</button>
        </div>
        <div class="chart-type">
            <button onclick="setChartType('line')">Line</button>
            <button onclick="setChartType('candlestick')">Candles</button>
        </div>
        <div class="chart-container">
            <canvas id="chart"></canvas>
        </div>
        <div class="trade-panel">
            <h3>Paper trade</h3>
            <div class="trade-controls">
                <input id="dollarAmount" type="number" placeholder="$ Amount" min="0.01" step="0.01">
                <button onclick="buyStock()">Buy</button>
                <button onclick="sellStock()">Sell</button>
            </div>
        </div>
    </div>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0f1115;
            color: #e6e6e6;
        }
        .trade-panel {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #1f222a;
        }
        .trade-controls {
            display: flex;
            gap:10px;
            margin-top: 10px;
        }
        .trade-controls input{
            background: #1c1f26;
            border: 1px solid #2a2d36;
            color: white;
            padding:8px;
            border-radius: 6px;
            width: 120px;
        }
        .trade-controls button {
            background: #1c1f26;
            border: 1px solid #2a2d36;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
        }
        .trade-controls button:hover {
            background: #2a2d36;
        }
        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #aaa;
        }

        .stats span {
            color: #fff;
            font-weight: 600;
            margin-left: 6px;
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 40px;
            background-color: #14161c;
            border-bottom: 1px solid #1f222a;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
        }

        .search-box input {
            padding: 10px 15px;
            background: #1c1f26;
            border: 1px solid #2a2d36;
            border-radius: 6px;
            color: white;
            width: 250px;
        }

        .card {
            margin: 40px auto;
            padding: 30px;
            background: #14161c;
            width: 85%;
            max-width: 1400px;
            margin:40px auto;
            padding:30px;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .chart-container {
            position: relative;
            height: 60vh;
            width: 100%;
        }

        #priceDisplay {
            font-size: 28px;
            font-weight: 600;
            margin: 20px 40px;
            transition: background 0.3s, color 0.3s;
            padding: 5px 10px;
            border-radius: 6px;
            width: fit-content;
        }

        .flash-up {
            background: rgba(0, 255, 100, 0.15);
            color: #00e676;
        }

        .flash-down {
            background: rgba(255, 50, 50, 0.15);
            color: #ff5252;
        }

        .time-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .time-buttons button {
            background: #1c1f26;
            border: 1px solid #2a2d36;
            color: #aaa;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .time-buttons button:hover {
            background: #2a2d36;
            color: white;
        }

        #loading {
            display: none;
            margin: 20px 40px;
            color: #aaa;
        }

        .fundamentals {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
        }

        .fundamentals span {
            color: white;
            font-weight: 600;
            margin-left: 5px;
        }

        .chart-type {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .chart-type button {
            background: #1c1f26;
            border: 1px solid #2a2d36;
            color: #aaa;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .chart-type button:hover {
            background: #2a2d36;
            color: white;
        }
    </style>

    <script>
        const stockCache = {}
        let chart
        let currentPrice = 0
        let simulatedPrice = 0
        let currentSymbol = null
        let currentRange = "1M"
        let dates
        let sortedDates
        let chartType = "line"
        let portfolio = []

        document.getElementById("symbolInput").addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                const symbol = this.value.trim().toUpperCase()
                if (symbol.length > 0) {
                    loadStock(symbol)
                }
            }
        })

        function loadStock(symbol) {
            document.getElementById("loading").style.display = "block"
            currentSymbol = symbol
            fetch('/api/stock?symbol=' + symbol)
                .then(res => res.json())
                .then(data => {

                    if (data.Note) {
                        alert("api limit")
                        return
                    }
                    if (data["Error message"]) {
                        alert("error")
                        return
                    }
                    const timeSeries = data["Time Series (Daily)"]
                    if (!timeSeries) {
                        console.error("API returned: ", data)
                        alert("check error in console")
                        return
                    }
                    sortedDates = Object.keys(timeSeries).sort()
                    const ranges = {
                        "5D": 5,
                        "1M": 30,
                        "6M": 180,
                        "1Y": 365,
                        "5Y": 1825
                    }
                    if (currentRange === "YTD") {
                        const year = new Date().getFullYear().toString()
                        dates = sortedDates.filter(d => d.startsWith(year))
                    } else if (ranges[currentRange]) {
                        dates = sortedDates.slice(-ranges[currentRange])
                    } else {
                        dates = sortedDates
                    }
                    const candleData = dates.map(date => ({
                        x: new Date(date),
                        o: parseFloat(timeSeries[date]["1. open"]),
                        h: parseFloat(timeSeries[date]["2. high"]),
                        l: parseFloat(timeSeries[date]["3. low"]),
                        c: parseFloat(timeSeries[date]["4. close"])
                    }))
                    const lineData = dates.map(date => ({
                        x: new Date(date),
                        y: parseFloat(timeSeries[date]["4. close"])
                    }))

                    const volumeData = dates.map(date =>({
                        x: new Date(date),
                        y: parseFloat(timeSeries[date]["5. volume"])
                    }))

                    const latestPrice = candleData[candleData.length - 1].c
                    currentPrice = latestPrice
                    simulatedPrice = latestPrice
                    document.getElementById("priceDisplay").childNodes[0].nodeValue = "$" + latestPrice.toFixed(2) + " ";

                    if (chart) chart.destroy()

                    document.getElementById("stockTitle").innerText = symbol
                    fetch('/api/overview?symbol=' + symbol)
                        .then(res => res.json())
                        .then(data => {
                            document.getElementById("marketCap").innerText = data.MarketCapitalization
                            document.getElementById("eps").innerText = data.EPS
                            document.getElementById("pe").innerText = data.PERatio
                            document.getElementById("dividend").innerText = data.DividendYield
                        })

                    chart = new Chart(document.getElementById("chart"), {
                        type: chartType,
                        data: {
                            datasets: [
                                {
                                label: symbol,
                                data: chartType === "line" ? lineData : candleData,
                                barThickness: 'flex',
                                maxBarThickness: 10,
                                categoryPercentage: 0.7,
                                barPercentage: 0.9,
                                tension: 0.3,
                                fill: chartType === "line",
                                pointRadius: 0,
                                borderColor: chartType == "line" ? "#00e676" : {
                                    up: "#00e676",
                                    down: "#ff5252",
                                    unchanged: "#999"
                                },
                                color: {
                                    up: '#00e676',
                                    down: '#ff5252',
                                    unchanged: '#999',
                                },
                                borderWidth: chartType ==="line" ? 2: {
                                    up : 1,
                                    down:1,
                                    unchanged:1
                                },
                                backgroundColor: "rgba(0,200,83,0.1)"
                            },
                            {
                                type:"bar",
                                label:"Volume",
                                data:volumeData,
                                yAxisID:"volume",
                                backgroundColor: candleData.map(c=>c.c>=c.o?'rgba(0,230,118,0.4)':'rgba(225,82,82,0.4)'),
                                borderWidth:0,
                                barThickness: 'flex',
                                maxBarThickness: 6,
                                categoryPercentage:0.6,
                                barPercentage:0.8
                            }
                        ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            animation: false,
                            interaction: {
                                mode: 'index',
                                intersect: false
                            },
                            plugins: {
                                legend: { display: false },
                                zoom: {
                                    pan: {
                                        enabled: true,
                                        mode: "x"
                                    },
                                    zoom: {
                                        wheel: {
                                            enabled: true
                                        },
                                        pinch: {
                                            enabled: true
                                        },
                                        mode: "x"
                                    }
                                }
                            },
                            scales: {
                                x: {
                                    type: 'timeseries',
                                    offset: false,
                                    bounds: "data",
                                    ticks: {
                                        color: "#888",
                                        maxRotation: 0,
                                        autoSkip: true,
                                        maxTicksLimit: 8
                                    },
                                    grid: { color: "#1f222a" }
                                },
                                y: {
                                    ticks: { color: "#888" },
                                    grid: { color: "#1f222a" },
                                    beginAtZero: false
                                },
                                volume: {
                                    position: "right",
                                    grid: {
                                        display: false
                                    },
                                    ticks: {
                                        display:false
                                    }
                                }
                            },
                            layout: {
                                padding: 10
                            }
                        }
                    });
                    const latestDate = dates[dates.length - 1];
                    const dayData = timeSeries[latestDate];
                    document.getElementById("openPrice").innerText = dayData["1. open"];
                    document.getElementById("highPrice").innerText = dayData["2. high"];
                    document.getElementById("lowPrice").innerText = dayData["3. low"];
                    document.getElementById("closePrice").innerText = dayData["4. close"];

                    document.getElementById("loading").style.display = "none"

                    stockCache[symbol] = data
                }
                )
        }

        function setRange(days) {
            currentRange = days;
            if (currentSymbol) {
                loadStock(currentSymbol);
            }
        }
        function setChartType(type) {
            chartType = type
            if (currentSymbol) {
                loadStock(currentSymbol)
            }
        }
        setInterval(() => {

            if (!currentSymbol) return

            const change = (Math.random() - 0.5) * 0.1
            simulatedPrice += change

            const priceElement = document.getElementById("priceDisplay")
            priceElement.childNodes[0].nodeValue = "$" + simulatedPrice.toFixed(2) + " "

            priceElement.classList.remove("flash-up", "flash-down")

            if (change > 0) {
                priceElement.classList.add("flash-up")
            } else {
                priceElement.classList.add("flash-down")
            }
            if (chart && chartType === "line") {
                chart.data.datasets[0].borderColor = change > 0 ? "#00e676" : "#ff5252"
                chart.update("none")
            }

        }, 1500)
        setInterval(() => {
            if (currentSymbol) {
                loadStock(currentSymbol)
            }
        }, 60000)
        function buyStock() {
            if(!currentSymbol) return
            const dollars=parseFloat(document.getElementById("dollarAmount").value)
            if (!dollars || dollars <=0) {
                alert("Enter valid amount")
                return
            }
            const shares = dollars/simulatedPrice
            const trade={
                symbol: currentSymbol,
                price:simulatedPrice,
                shares:shares,
                dollars: dollars,
                type:"BUY",
                time:Date.now()
            }
            portfolio.push(trade)
            console.log("portfolio: ", portfolio)
        }
        function sellStock() {
            if(!currentSymbol) return
            const dollars=parseFloat(document.getElementById("dollarAmount").value)
            if (!dollars || dollars <=0) {
                alert("Enter valid amount")
                return
            }
            const shares = dollars/simulatedPrice
            const trade={
                symbol: currentSymbol,
                price:simulatedPrice,
                shares:shares,
                dollars:dollars,
                type:"SELL",
                time:Date.now()
            }
            portfolio.push(trade)
            console.log("portfolio: ", portfolio)
        }
    </script>

</body>

</html>
